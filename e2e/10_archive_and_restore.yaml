appId: com.nav1885.micromoment
---
- launchApp:
    clearState: true
- runFlow: _skip_onboarding.yaml

# Add a habit
- tapOn: "Add Habit"
- tapOn:
    text: "Habit name"
- inputText: "Stretch"
- tapOn: "Save Habit"

# Open detail
- tapOn: "Stretch"

# Enter edit mode
- tapOn: "Edit"

# Archive
- tapOn:
    text: "Archive habit"
- tapOn: "Archive"

# Home — habit gone
- assertNotVisible: "Stretch"

# Check archived in Settings
- tapOn: "Settings"
- assertVisible: "Stretch"

# Restore
- tapOn:
    text: "Restore Stretch"

# No longer in archive list
- assertNotVisible: "Stretch"

# Back to Today — should be restored
- tapOn: "Today"
- assertVisible: "Stretch"
