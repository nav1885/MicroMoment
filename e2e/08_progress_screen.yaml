appId: com.nav1885.micromoment
---
- launchApp:
    clearState: true
- runFlow: _skip_onboarding.yaml

# Add and complete a habit
- tapOn: "Add Habit"
- tapOn:
    text: "Habit name"
- inputText: "Run"
- tapOn: "Save Habit"
- tapOn:
    text: "Mark habit complete"

# Go to Progress tab
- tapOn: "Progress"
- assertVisible: "Progress"
- assertVisible: "LAST 7 DAYS"
- assertVisible: "8-WEEK ACTIVITY"
- assertVisible: "HABITS"
- assertVisible: "Run"
