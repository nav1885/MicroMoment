appId: com.nav1885.micromoment
---
- launchApp:
    clearState: true
- runFlow: _skip_onboarding.yaml

# Add a habit
- tapOn: "Add Habit"
- tapOn:
    text: "Habit name"
- inputText: "Daily walk"
- tapOn: "Save Habit"

# Mark it complete from home
- tapOn:
    text: "Mark habit complete"

# Check button should now show completed state
- assertVisible:
    text: "Habit completed"
