appId: com.nav1885.micromoment
---
- launchApp:
    clearState: true
- runFlow: _skip_onboarding.yaml

# Add a habit
- tapOn: "Add Habit"
- tapOn:
    text: "Habit name"
- inputText: "Temp habit"
- tapOn: "Save Habit"
- assertVisible: "Temp habit"

# Swipe left to reveal delete
- swipe:
    direction: LEFT
    element:
      text: "Temp habit"

# Tap Delete
- tapOn:
    text: "Delete habit"

# Confirm alert
- tapOn: "Delete"

# Gone
- assertNotVisible: "Temp habit"
- assertVisible: "No habits yet"
