appId: com.nav1885.micromoment
---
- launchApp:
    clearState: true
- runFlow: _skip_onboarding.yaml

# Add a habit
- tapOn: "Add Habit"
- tapOn:
    text: "Habit name"
- inputText: "Meditate"
- tapOn: "Save Habit"

# Tap the habit name to open detail screen
- tapOn: "Meditate"
- assertVisible: "Meditate"
- assertVisible: "Mark Complete"

# Mark complete from detail
- tapOn: "Mark Complete"
- assertVisible: "Completed Today"

# Go back
- tapOn: "Back"
- assertVisible: "Meditate"
